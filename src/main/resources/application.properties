# ============================================
# DATABASE CONFIGURATION
# ============================================
# Uses environment variables on Render; falls back to local values for dev.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://dpg-d77dfb4hg0os73cb5o80-a:5432/placement_portal_1mxt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:placement_portal_1mxt_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hRdl5JD6kFApf3kZXGwG207EPcXiHg6z}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# PostgreSQL dialect - required to generate correct SQL for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# SERVER CONFIGURATION
# ============================================
# Render injects the PORT environment variable; default to 8080 for local dev
server.port=${PORT:8080}

# ============================================
# GOOGLE OAUTH2 CLIENT CONFIGURATION
# ============================================
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

# ============================================
# JWT (Security Token) Configuration
# ============================================
jwt.secret=${JWT_SECRET:placementPortalSecretKey}
jwt.expiration=86400000

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO